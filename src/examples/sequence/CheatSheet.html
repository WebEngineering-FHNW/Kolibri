<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kolibri Sequence Cheat Sheet</title>
  <link rel="shortcut icon" type="image/png" href="../../../img/logo/logo-60x54.png"/>
</head>
<style>
    body {
        margin: 1em;
    }
    main {
        display: grid;
        grid-template-columns: max-content max-content auto;
        gap: .5lh 1em;
    }
    main div {
        display: grid;
        grid-template-columns: subgrid;
        grid-column: 1 / -1;
        align-items: baseline;
    }
    .src, .out {
        font-family: monospace;
    }
    .out {
        color: #0006;
    }

</style>
<body>
<header>
  <h1>Kolibri Sequence Cheat Sheet</h1>
</header>

<main>

</main>

<script type="module">
    import { Sequence, Seq, Walk, ALL, plusOp, forever}  from "../../kolibri/sequence/sequence.js";
    import { dom }          from "../../kolibri/util/dom.js";

    const main = document.querySelector("main");

    const makeRow = (code, result) => dom (`
        <div>
            <span class="src">${code}</span>
            <span class="out">${result}</span>
        </div>
    `);
    const codeLines = [
        "Walk().show()",
        "Walk().show(10)",
        "Walk(5).show()",
        "Walk(5,10).show()",
        "Walk(0,20,5).show()",
        "Walk(100,0,-7).show()",
        "Walk(1,ALL,2).take(4).show()",
        "Walk(1,5,2) ['=='] (Walk(5,1,2))",
        "Walk(1,5,-2).eq$(Walk(5,1,-2))",
        "Seq().show()",
        "Seq(1,2,3).show()",
        "Seq(3,4,5,6) ['=='] (Walk(3,6))",
        "Seq(42,'***',true).show()",
        "Seq(...[1,2,3]).eq$(Walk(1,3))",
        "Seq(1).cycle().show()",
        "Seq('_','🌹','🐦‍🔥').cycle().show()",
        "Sequence('a', x => x.length < 100, x => x+x).show()",
        "Sequence(1, forever, x => x/2).show()",
        "Walk().map (n => n*n).show()",
        "Walk().fmap(n => n*n).show()",
        "Walk().take(5).show()",
        "Walk().takeWhile(n => n < 9).show()",
        "Walk().takeWhere(n => n % 3 === 0).show()",
        "Walk().drop(5).show()",
        "Walk().dropWhile(n => n < 9).show()",
        "Walk().dropWhere(n => n % 3 === 0).show()",

    ];
    codeLines.forEach( line => main.append(...makeRow(line, eval(line))) );


</script>

</body>
</html>
